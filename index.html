<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ICE原糖CV指数周度季节性图</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fa;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #667085;
        --line: #d8dee8;
        --accent: #c43333;
        --blue: #4169e1;
        --green: #2f8f67;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          sans-serif;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
        padding: 22px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 25px;
        line-height: 1.25;
        font-weight: 720;
        letter-spacing: 0;
      }

      .subhead {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      a.button {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        color: var(--text);
        padding: 8px 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 620;
      }

      a.button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      main {
        padding: 22px 0 42px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px 14px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 18px;
        line-height: 1.3;
        font-weight: 720;
      }

      .chart-stack {
        display: grid;
        gap: 18px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      figure img {
        display: block;
        width: 100%;
        height: auto;
        background: #ffffff;
      }

      figcaption {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        align-items: baseline;
        justify-content: space-between;
        border-top: 1px solid var(--line);
        padding: 11px 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      figcaption strong {
        color: var(--text);
      }

      .forecast {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 560px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        text-align: left;
        font-size: 14px;
      }

      th {
        background: #f8fafc;
        color: #475467;
        font-weight: 680;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      @media (max-width: 820px) {
        .topbar {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .shell {
          width: min(100% - 22px, 1180px);
        }

        h1 {
          font-size: 21px;
        }

        .metrics {
          grid-template-columns: 1fr;
        }

        figcaption {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="shell topbar">
        <div>
          <h1>ICE原糖CV指数周度季节性图</h1>
          <p class="subhead">
            基于 UNo.11SB 蜡烛图与特殊价差数据，展示全样本、牛市条件、熊市条件下的周度季节性结构。
          </p>
        </div>
        <nav class="actions" aria-label="下载与源码">
          <a class="button primary" href="assets/forecast.csv">下载预测CSV</a>
          <a class="button" href="data/UNo.11SB蜡烛图与特殊价差.xlsx">下载原始Excel</a>
          <a class="button" href="src/generate_charts.py">查看生成脚本</a>
        </nav>
      </div>
    </header>

    <main class="shell">
      <section class="metrics" aria-label="数据概览">
        <div class="metric">
          <span>数据区间</span>
          <strong id="data-range">读取中</strong>
        </div>
        <div class="metric">
          <span>最新周频点</span>
          <strong id="latest-week">读取中</strong>
        </div>
        <div class="metric">
          <span>当前/对比年份</span>
          <strong id="year-pair">读取中</strong>
        </div>
        <div class="metric">
          <span>AR模型</span>
          <strong id="ar-model">读取中</strong>
        </div>
      </section>

      <section class="chart-stack" aria-label="三张图表">
        <figure>
          <img src="assets/ice_sugar_cv_all_sample.png" alt="ICE原糖CV指数全样本周度季节性结构图" />
          <figcaption>
            <strong>全样本区间</strong>
            <span>2004-2025 年历史 20%-80% 分位区间、中位数、上一年、当前年与 AR 预测。</span>
          </figcaption>
        </figure>

        <figure>
          <img src="assets/ice_sugar_cv_bull_market.png" alt="ICE原糖CV指数牛市条件周度季节性结构图" />
          <figcaption>
            <strong>牛市条件</strong>
            <span>牛市年份样本的 20%-80% 分位区间与中位数，对照上一年和当前年走势。</span>
          </figcaption>
        </figure>

        <figure>
          <img src="assets/ice_sugar_cv_bear_market.png" alt="ICE原糖CV指数熊市条件周度季节性结构图" />
          <figcaption>
            <strong>熊市条件</strong>
            <span>熊市年份样本的 20%-80% 分位区间与中位数，对照上一年和当前年走势。</span>
          </figcaption>
        </figure>
      </section>

      <section class="forecast" aria-label="AR预测结果">
        <table>
          <thead>
            <tr>
              <th>预测日期</th>
              <th>ISO年份</th>
              <th>ISO周</th>
              <th>AR预测CV</th>
            </tr>
          </thead>
          <tbody id="forecast-body">
            <tr>
              <td colspan="4">读取中</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script>
      const numberFormat = new Intl.NumberFormat("zh-CN", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      fetch("assets/chart_metadata.json")
        .then((response) => response.json())
        .then((meta) => {
          document.querySelector("#data-range").textContent = `${meta.data_start} 至 ${meta.data_end}`;
          document.querySelector("#latest-week").textContent = `ISO第${meta.latest_week}周，CV ${numberFormat.format(meta.latest_cv)}`;
          document.querySelector("#year-pair").textContent = `${meta.current_year} / ${meta.previous_year}`;
          document.querySelector("#ar-model").textContent = `AR(${meta.ar_model.best_p})`;

          const rows = meta.forecast
            .map(
              (item) => `
                <tr>
                  <td>${item.date}</td>
                  <td>${item.iso_year}</td>
                  <td>${item.iso_week}</td>
                  <td>${numberFormat.format(item.cv)}</td>
                </tr>
              `
            )
            .join("");
          document.querySelector("#forecast-body").innerHTML = rows;
        })
        .catch(() => {
          document.querySelector("#data-range").textContent = "暂无元数据";
          document.querySelector("#latest-week").textContent = "暂无元数据";
          document.querySelector("#year-pair").textContent = "暂无元数据";
          document.querySelector("#ar-model").textContent = "暂无元数据";
          document.querySelector("#forecast-body").innerHTML = '<tr><td colspan="4">暂无元数据</td></tr>';
        });
    </script>
  </body>
</html>
